name: mindful_diary
description: "MODO — дневник осознанности и трекер целей."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  flutter_local_notifications: 21.0.0
  timezone: 0.11.0
  fl_chart: ^0.69.0
  share_plus: ^10.0.0
  file_picker: ^8.0.0
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  local_auth: ^2.3.0
  flutter_rustore_pay: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
